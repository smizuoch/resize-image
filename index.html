<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>resize-image</title>
  <meta name="description" content="画像サイズ変更ツール" />
  <style>
    :root {
      --bg: #e9e9ec;
      --surface: #f5f5f7;
      --panel: #ffffff;
      --text: #1f1f21;
      --muted: #6b6b73;
      --line: #d9d9df;
      --blue: #2563ff;
      --blue-hover: #1d4fe0;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.18);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --ui-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--ui-font);
      color: var(--text);
      background: linear-gradient(180deg, #dbdbe1 0%, var(--bg) 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .dialog {
      position: relative;
      width: min(1220px, calc(100vw - 32px));
      min-height: min(720px, calc(100vh - 32px));
      background: var(--panel);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: minmax(0, 1.78fr) minmax(360px, 434px);
    }

    .workspace {
      background: #efeff2;
      padding: 28px 28px 20px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .dropzone {
      flex: 1;
      border: 4px dashed #dbdbdf;
      border-radius: 18px;
      background: #ededf0;
      color: var(--text);
      display: grid;
      place-items: center;
      text-align: center;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      min-height: 520px;
      padding: 24px;
      outline: none;
    }

    .dropzone.dragover {
      background: #f4f7ff;
      border-color: #9fb8ff;
      transform: scale(0.997);
    }

    .dropzone-icon {
      position: relative;
      width: 132px;
      height: 132px;
      margin: 0 auto 22px;
    }

    .dropzone-icon svg:first-child {
      width: 100%;
      height: 100%;
      display: block;
    }

    .dropzone-plus {
      position: absolute;
      left: 10px;
      top: 18px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #d8d8ff;
      color: #5b63ff;
      display: grid;
      place-items: center;
      font-size: 36px;
      line-height: 1;
      font-weight: 300;
    }

    .dropzone-title {
      margin: 0;
      font-size: clamp(28px, 3.3vw, 46px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .dropzone-title .link {
      color: #315bf8;
      text-decoration: none;
    }

    .dropzone-help {
      margin: 14px 0 0;
      font-size: 18px;
      color: var(--muted);
    }

    .editor-layout {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0;
    }

    .editor-layout.active {
      display: flex;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 16px;
      overflow: hidden;
    }

    .canvas-area {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 14px;
    }

    .crop-stage {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
      touch-action: none;
      outline: none;
      border-radius: 2px;
      background: #d6d6dc;
    }

    .crop-stage.dragging {
      cursor: grabbing;
    }

    .crop-image {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      will-change: transform;
      pointer-events: none;
      max-width: none;
      max-height: none;
      image-rendering: auto;
    }

    .crop-grid {
      position: absolute;
      pointer-events: auto;
      cursor: move;
      z-index: 2;
      border: 2px dashed var(--blue);
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .crop-grid::before,
    .crop-grid::after {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .crop-grid::before {
      content: "";
      background:
        linear-gradient(to right,
          transparent calc(33.333% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(33.333% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(33.333% + 0.5px),
          transparent calc(33.333% + 0.5px),
          transparent calc(66.666% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(66.666% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(66.666% + 0.5px),
          transparent calc(66.666% + 0.5px)
        ),
        linear-gradient(to bottom,
          transparent calc(33.333% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(33.333% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(33.333% + 0.5px),
          transparent calc(33.333% + 0.5px),
          transparent calc(66.666% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(66.666% - 0.5px),
          rgba(255, 255, 255, 0.95) calc(66.666% + 0.5px),
          transparent calc(66.666% + 0.5px)
        );
    }

    .crop-grid::after {
      content: "";
      background:
        radial-gradient(circle at 0 0, transparent 11px, var(--blue) 11px, var(--blue) 14px, transparent 14px) top left / 28px 28px no-repeat,
        radial-gradient(circle at 100% 0, transparent 11px, var(--blue) 11px, var(--blue) 14px, transparent 14px) top right / 28px 28px no-repeat,
        radial-gradient(circle at 0 100%, transparent 11px, var(--blue) 11px, var(--blue) 14px, transparent 14px) bottom left / 28px 28px no-repeat,
        radial-gradient(circle at 100% 100%, transparent 11px, var(--blue) 11px, var(--blue) 14px, transparent 14px) bottom right / 28px 28px no-repeat;
    }

    .crop-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .crop-handle {
      position: absolute;
      width: 18px;
      height: 18px;
      background: var(--blue);
      border: 2.5px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      z-index: 10;
      pointer-events: auto;
    }

    .crop-handle[data-handle="nw"] { top: -9px; left: -9px; cursor: nw-resize; }
    .crop-handle[data-handle="n"]  { top: -9px; left: calc(50% - 9px); cursor: n-resize; }
    .crop-handle[data-handle="ne"] { top: -9px; right: -9px; cursor: ne-resize; }
    .crop-handle[data-handle="w"]  { top: calc(50% - 9px); left: -9px; cursor: w-resize; }
    .crop-handle[data-handle="e"]  { top: calc(50% - 9px); right: -9px; cursor: e-resize; }
    .crop-handle[data-handle="sw"] { bottom: -9px; left: -9px; cursor: sw-resize; }
    .crop-handle[data-handle="s"]  { bottom: -9px; left: calc(50% - 9px); cursor: s-resize; }
    .crop-handle[data-handle="se"] { bottom: -9px; right: -9px; cursor: se-resize; }

    .drag-toast {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      min-width: 290px;
      max-width: calc(100% - 48px);
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 12px 30px rgba(37, 99, 255, 0.28);
      z-index: 5;
    }

    .drag-toast.hidden {
      display: none;
    }

    .drag-toast .toast-spacer {
      flex: 1;
    }

    .drag-toast button {
      appearance: none;
      background: transparent;
      border: 0;
      color: inherit;
      font-size: 20px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
    }

    .controls-footer {
      margin-top: auto;
      padding: 4px 10px 0;
    }

    .zoom-block {
      max-width: 280px;
      padding-top: 8px;
    }

    .zoom-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      margin-bottom: 10px;
      color: var(--muted);
    }

    .slider {
      width: 100%;
      accent-color: var(--blue);
      cursor: pointer;
    }

    .side-panel {
      background: #ffffff;
      padding: 40px 38px 28px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: auto;
    }

    .panel-title {
      margin: 0;
      font-size: clamp(34px, 2.4vw, 52px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .panel-description {
      margin: 18px 0 0;
      font-size: 18px;
      color: #45454d;
      line-height: 1.45;
    }

    .divider {
      margin: 22px 0 26px;
      height: 1px;
      background: var(--line);
      border: 0;
    }

    .stack {
      display: grid;
      gap: 20px;
    }

    .field {
      display: grid;
      gap: 9px;
    }

    .field label,
    .plain-label {
      font-size: 15px;
      color: #4a4a52;
    }

    .select,
    .text-input {
      width: 100%;
      height: 50px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: #efeff1;
      padding: 0 14px;
      color: var(--text);
      outline: none;
    }

    .select:focus,
    .text-input:focus {
      border-color: #9cb6ff;
      background: #f8faff;
    }

    .dimensions-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) 84px;
      gap: 10px;
      align-items: end;
    }

    .mini-field {
      display: grid;
      gap: 8px;
    }

    .lock-button {
      align-self: end;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 0;
      background: #1f1f21;
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .lock-button.unlocked {
      background: #d9d9df;
      color: #4a4a52;
    }

    .thumbnail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px 12px;
    }

    .thumb-card {
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 8px 8px 10px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .thumb-card:hover {
      border-color: #cad7ff;
      background: #f8faff;
    }

    .thumb-card.active {
      border-color: #212121;
      background: #fff;
    }

    .thumb-preview {
      width: 100%;
      height: 78px;
      border-radius: 10px;
      background: #efeff2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .thumb-preview .preview-box {
      position: relative;
      width: 54px;
      height: 54px;
      border-radius: 7px;
      overflow: hidden;
      background: #d7d7de;
      flex: 0 0 auto;
    }

    .thumb-preview img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      min-height: 1.2em;
    }

    .thumb-size {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .size-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-top: 8px;
      margin-bottom: 18px;
    }

    .size-info {
      display: grid;
      gap: 7px;
    }

    .size-item {
      font-size: 15px;
      color: #242429;
    }

    .size-item strong {
      font-weight: 800;
    }

    .reset-button {
      align-self: center;
      height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f6f6f8;
      color: #1f1f21;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary,
    .secondary {
      height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .primary {
      background: var(--blue);
      color: #fff;
    }

    .primary:hover {
      background: var(--blue-hover);
    }

    .secondary {
      background: #fff;
      border: 1px solid #d2d2d8;
      color: #25252a;
    }

    .secondary:hover {
      background: #f8f8fb;
    }

    .hidden {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .status-note {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      min-height: 1.2em;
    }

    @media (max-width: 980px) {
      .app-shell {
        padding: 12px;
      }

      .dialog {
        width: 100%;
        min-height: calc(100vh - 24px);
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 56vh) auto;
        border-radius: 18px;
      }

      .workspace {
        padding: 18px;
      }

      .side-panel {
        padding: 24px 20px 20px;
      }

      .dropzone {
        min-height: 360px;
      }

    }

    @media (max-width: 640px) {
      .dimensions-grid {
        grid-template-columns: 1fr 52px 1fr;
      }

      .dimensions-grid .unit-field {
        grid-column: 1 / -1;
      }

      .thumbnail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .button-row {
        flex-direction: column;
      }

      .primary,
      .secondary,
      .reset-button {
        width: 100%;
      }

      .panel-title {
        font-size: 28px;
      }

      .panel-description {
        font-size: 16px;
      }

      .dropzone-title {
        font-size: 20px;
      }

      .dropzone-help {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="dialog" role="dialog" aria-modal="true" aria-label="画像のサイズを変更">
      <section class="workspace">
        <label class="dropzone" id="dropzone" tabindex="0" aria-label="画像をアップロード">
          <input class="sr-only" id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" />
          <div id="dropzoneContent">
            <div class="dropzone-icon" aria-hidden="true">
              <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="38" width="72" height="54" rx="16" stroke="#222" stroke-width="5" />
                <path d="M18 76.5L40 54L58 71L70 59L90 80" stroke="#222" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="72" cy="54" r="8" stroke="#222" stroke-width="5" />
                <path d="M82 22H108C113.523 22 118 26.4772 118 32V86C118 91.5228 113.523 96 108 96H96" stroke="#c9c9f7" stroke-width="18" stroke-linecap="round" opacity="0.85" />
              </svg>
              <div class="dropzone-plus">+</div>
            </div>
            <p class="dropzone-title">画像をドラッグ＆ドロップ または<span class="link">参照</span></p>
            <p class="dropzone-help">ファイルは JPEG, JPG, PNG, WEBP または HEIC、かつ 40 MB 以下である必要があります</p>
          </div>
        </label>

        <div class="editor-layout" id="editorLayout">
          <div class="canvas-wrap">
            <div class="canvas-area" id="canvasArea">
              <div class="crop-stage" id="cropStage" tabindex="0" aria-label="画像キャンバス">
                <img class="crop-image" id="cropImage" alt="アップロード画像" draggable="false" />
                <div class="crop-overlay" id="cropOverlay"></div>
                <div class="crop-grid" id="cropGrid">
                  <div class="crop-handle" data-handle="nw"></div>
                  <div class="crop-handle" data-handle="n"></div>
                  <div class="crop-handle" data-handle="ne"></div>
                  <div class="crop-handle" data-handle="w"></div>
                  <div class="crop-handle" data-handle="e"></div>
                  <div class="crop-handle" data-handle="sw"></div>
                  <div class="crop-handle" data-handle="s"></div>
                  <div class="crop-handle" data-handle="se"></div>
                </div>
              </div>
              <div class="drag-toast" id="dragToast" aria-live="polite">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 3V21M3 12H21M7 7L3 12L7 17M17 7L21 12L17 17M7 7H17M7 17H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>画像をドラッグしてパン</span>
                <span class="toast-spacer"></span>
                <button type="button" id="dismissToast" aria-label="閉じる">×</button>
              </div>
            </div>
          </div>

          <div class="controls-footer">
            <div class="zoom-block">
              <div class="zoom-label-row">
                <span>ズーム</span>
                <span id="zoomValue">1x</span>
              </div>
              <input class="slider" id="zoomSlider" type="range" min="1" max="10" step="0.1" value="1" />
            </div>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <h1 class="panel-title">画像のサイズを変更</h1>
        <p class="panel-description">写真のサイズを変更します。</p>
        <hr class="divider" />

        <div class="stack">
          <div class="field">
            <label for="groupSelect">縦横比</label>
            <select class="select" id="groupSelect"></select>
          </div>

          <div id="presetSection" class="field hidden">
            <div class="thumbnail-grid" id="presetGrid"></div>
          </div>

          <div class="field">
            <div class="dimensions-grid">
              <div class="mini-field">
                <label for="widthInput">幅</label>
                <input class="text-input" id="widthInput" type="number" min="50" max="6000" step="1" />
              </div>

              <button class="lock-button" type="button" id="lockButton" aria-pressed="true" title="縦横比を固定">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M7 11V8C7 5.23858 9.23858 3 12 3C14.7614 3 17 5.23858 17 8V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <rect x="5" y="11" width="14" height="10" rx="3" stroke="currentColor" stroke-width="2" />
                </svg>
              </button>

              <div class="mini-field">
                <label for="heightInput">高さ</label>
                <input class="text-input" id="heightInput" type="number" min="50" max="6000" step="1" />
              </div>

              <div class="mini-field unit-field">
                <label for="unitSelect">単位</label>
                <select class="select" id="unitSelect">
                  <option value="px">px</option>
                </select>
              </div>
            </div>
          </div>

          <div class="size-row">
            <div class="size-info">
              <div class="size-item">元のサイズ： <strong id="originalSize">--</strong></div>
              <div class="size-item">変更後のサイズ： <strong id="outputSize">--</strong></div>
            </div>
            <button class="reset-button" id="resetButton" type="button">リセット</button>
          </div>

          <div class="button-row">
            <button class="primary" id="downloadButton" type="button">ダウンロード</button>
          </div>
          <div class="status-note" id="statusNote"></div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const presetGroups = {
      Instagram: [
        { id: 'instagram-post', label: '投稿', width: 1080, height: 1080 },
        { id: 'instagram-portrait', label: '縦置き', width: 1080, height: 1350 },
        { id: 'instagram-story', label: 'ストーリー', width: 1080, height: 1920 },
        { id: 'instagram-landscape', label: '横置き', width: 1080, height: 566 }
      ],
      YouTube: [
        { id: 'youtube-thumb', label: 'サムネイル', width: 1280, height: 720 },
        { id: 'youtube-shorts', label: 'Shorts', width: 1080, height: 1920 },
        { id: 'youtube-square', label: '正方形', width: 1080, height: 1080 },
        { id: 'youtube-banner', label: 'バナー', width: 2560, height: 1440 }
      ],
      Facebook: [
        { id: 'facebook-post', label: '投稿', width: 1200, height: 630 },
        { id: 'facebook-story', label: 'ストーリー', width: 1080, height: 1920 },
        { id: 'facebook-square', label: '正方形', width: 1080, height: 1080 },
        { id: 'facebook-landscape', label: '横置き', width: 1280, height: 720 }
      ],
      LinkedIn: [
        { id: 'linkedin-post', label: '投稿', width: 1200, height: 627 },
        { id: 'linkedin-square', label: '正方形', width: 1080, height: 1080 },
        { id: 'linkedin-portrait', label: '縦置き', width: 1080, height: 1350 },
        { id: 'linkedin-landscape', label: '横置き', width: 1280, height: 720 }
      ],
      Snapchat: [
        { id: 'snap-story', label: 'ストーリー', width: 1080, height: 1920 },
        { id: 'snap-square', label: '正方形', width: 1080, height: 1080 },
        { id: 'snap-landscape', label: '横置き', width: 1280, height: 720 },
        { id: 'snap-post', label: '投稿', width: 1080, height: 1350 }
      ],
      X: [
        { id: 'x-post', label: '投稿', width: 1200, height: 670 },
        { id: 'x-landscape', label: '横置き', width: 1280, height: 720 },
        { id: 'x-portrait', label: '縦置き', width: 720, height: 1280 },
        { id: 'x-square', label: '正方形', width: 1200, height: 1200 }
      ],
      Pinterest: [
        { id: 'pin-standard', label: 'ピン', width: 1000, height: 1500 },
        { id: 'pin-square', label: '正方形', width: 1000, height: 1000 },
        { id: 'pin-landscape', label: '横置き', width: 1200, height: 675 },
        { id: 'pin-story', label: '縦置き', width: 1080, height: 1920 }
      ],
      Standard: [
        { id: 'std-landscape', label: '横置き', width: 1920, height: 1080 },
        { id: 'std-portrait', label: '縦置き', width: 1080, height: 1920 },
        { id: 'std-square', label: '正方形', width: 1080, height: 1080 },
        { id: 'std-classic', label: '4:3', width: 1600, height: 1200 }
      ],
      Custom: []
    };

    const state = {
      file: null,
      image: null,
      imageURL: '',
      fileType: 'image/png',
      originalWidth: 0,
      originalHeight: 0,
      originalSize: 0,
      selectedGroup: 'X',
      activePresetId: 'x-landscape',
      width: 1280,
      height: 720,
      locked: true,
      zoom: 1,
      baseScale: 1,
      minScale: 1,
      imageWidth: 0,
      imageHeight: 0,
      offsetX: 0,
      offsetY: 0,
      cropX: 0,
      cropY: 0,
      cropW: 0,
      cropH: 0,
      toastDismissed: false,
      estimateTimer: null,
      previewBlobUrl: ''
    };

    const elements = {
      dropzone: document.getElementById('dropzone'),
      fileInput: document.getElementById('fileInput'),
      editorLayout: document.getElementById('editorLayout'),
      cropStage: document.getElementById('cropStage'),
      cropImage: document.getElementById('cropImage'),
      cropGrid: document.getElementById('cropGrid'),
      cropOverlay: document.getElementById('cropOverlay'),
      groupSelect: document.getElementById('groupSelect'),
      presetSection: document.getElementById('presetSection'),
      presetGrid: document.getElementById('presetGrid'),
      widthInput: document.getElementById('widthInput'),
      heightInput: document.getElementById('heightInput'),
      lockButton: document.getElementById('lockButton'),
      unitSelect: document.getElementById('unitSelect'),
      originalSize: document.getElementById('originalSize'),
      outputSize: document.getElementById('outputSize'),
      resetButton: document.getElementById('resetButton'),
      downloadButton: document.getElementById('downloadButton'),
      zoomSlider: document.getElementById('zoomSlider'),
      zoomValue: document.getElementById('zoomValue'),
      statusNote: document.getElementById('statusNote'),
      dragToast: document.getElementById('dragToast'),
      dismissToast: document.getElementById('dismissToast')
    };

    function init() {
      populateGroups();
      renderPresets();
      syncDimensionInputs();
      updateLockButton();
      updateCanvasAspect();
      bindEvents();
      elements.originalSize.textContent = '--';
      elements.outputSize.textContent = '--';
      elements.statusNote.textContent = '画像を読み込むとプレビューとサイズ変更が有効になります。';
    }

    function populateGroups() {
      const labels = {
        Instagram: 'Instagram',
        YouTube: 'YouTube',
        Facebook: 'Facebook',
        LinkedIn: 'LinkedIn',
        Snapchat: 'Snapchat',
        X: 'X (Twitter)',
        Pinterest: 'Pinterest',
        Standard: '通常',
        Custom: 'カスタム'
      };

      elements.groupSelect.innerHTML = '';
      Object.keys(presetGroups).forEach((group) => {
        const option = document.createElement('option');
        option.value = group;
        option.textContent = labels[group] || group;
        if (group === state.selectedGroup) option.selected = true;
        elements.groupSelect.appendChild(option);
      });
    }

    function renderPresets() {
      const presets = presetGroups[state.selectedGroup] || [];
      elements.presetGrid.innerHTML = '';
      elements.presetSection.classList.toggle('hidden', presets.length === 0);

      presets.forEach((preset) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'thumb-card' + (preset.id === state.activePresetId ? ' active' : '');
        card.dataset.presetId = preset.id;
        card.innerHTML = `
          <div class="thumb-preview">
            <div class="preview-box" style="aspect-ratio:${preset.width} / ${preset.height}; width:${getThumbWidth(preset.width, preset.height)}px; height:${getThumbHeight(preset.width, preset.height)}px;">
              ${state.imageURL ? `<img src="${state.imageURL}" alt="">` : ''}
            </div>
          </div>
          <span class="thumb-label">${preset.label}</span>
          <div class="thumb-size">${preset.width}x${preset.height}</div>
        `;
        card.addEventListener('click', () => applyPreset(preset.id));
        elements.presetGrid.appendChild(card);
      });
    }

    function getThumbWidth(width, height) {
      const ratio = width / height;
      if (ratio >= 1) return 54;
      return Math.max(26, Math.round(54 * ratio));
    }

    function getThumbHeight(width, height) {
      const ratio = width / height;
      if (ratio < 1) return 54;
      return Math.max(26, Math.round(54 / ratio));
    }

    function applyPreset(id) {
      const preset = (presetGroups[state.selectedGroup] || []).find((item) => item.id === id);
      if (!preset) return;
      state.activePresetId = id;
      state.width = preset.width;
      state.height = preset.height;
      syncDimensionInputs();
      updateCanvasAspect();
      renderPresets();
      fitImageToViewport(false);
      estimateOutputSize();
    }

    function bindEvents() {
      elements.dropzone.addEventListener('click', () => elements.fileInput.click());
      elements.dropzone.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          elements.fileInput.click();
        }
      });

      elements.fileInput.addEventListener('change', (event) => {
        const file = event.target.files && event.target.files[0];
        if (file) loadFile(file);
      });

      ['dragenter', 'dragover'].forEach((type) => {
        elements.dropzone.addEventListener(type, (event) => {
          event.preventDefault();
          elements.dropzone.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach((type) => {
        elements.dropzone.addEventListener(type, (event) => {
          event.preventDefault();
          if (type === 'drop') {
            const file = event.dataTransfer?.files?.[0];
            if (file) loadFile(file);
          }
          elements.dropzone.classList.remove('dragover');
        });
      });

      elements.groupSelect.addEventListener('change', () => {
        state.selectedGroup = elements.groupSelect.value;
        const firstPreset = presetGroups[state.selectedGroup]?.[0];
        state.activePresetId = firstPreset ? firstPreset.id : null;
        if (firstPreset) {
          state.width = firstPreset.width;
          state.height = firstPreset.height;
        }
        syncDimensionInputs();
        updateCanvasAspect();
        renderPresets();
        fitImageToViewport(false);
        estimateOutputSize();
      });

      elements.widthInput.addEventListener('input', () => onDimensionInput('width'));
      elements.heightInput.addEventListener('input', () => onDimensionInput('height'));

      elements.lockButton.addEventListener('click', () => {
        state.locked = !state.locked;
        updateLockButton();
      });

      elements.zoomSlider.addEventListener('input', () => {
        state.zoom = clamp(parseFloat(elements.zoomSlider.value) || 1, 1, 10);
        updateZoomLabel();
        constrainOffsets();
        renderImageTransform();
        estimateOutputSize();
      });

      elements.resetButton.addEventListener('click', () => {
        if (!state.image) return;
        if (state.activePresetId) {
          applyPreset(state.activePresetId);
        }
        fitImageToViewport(true);
        elements.statusNote.textContent = '位置とズームをリセットしました。';
      });

      elements.downloadButton.addEventListener('click', async () => {
        if (!state.image) {
          elements.statusNote.textContent = '先に画像をアップロードしてください。';
          return;
        }
        const blob = await exportBlob();
        if (!blob) return;
        const ext = typeToExtension(blob.type);
        const name = (state.file?.name?.replace(/\.[^.]+$/, '') || 'resized-image') + '.' + ext;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        elements.statusNote.textContent = '画像を書き出しました。';
      });

      elements.dismissToast.addEventListener('click', () => {
        state.toastDismissed = true;
        updateToast();
      });

      setupDragging();
      setupCropBoxDragging();
      window.addEventListener('resize', () => {
        if (!state.image) return;
        const stageRect = elements.cropStage.getBoundingClientRect();
        state.cropX = clamp(state.cropX, 0, Math.max(0, stageRect.width - state.cropW));
        state.cropY = clamp(state.cropY, 0, Math.max(0, stageRect.height - state.cropH));
        updateCropBox();
        fitImageToViewport(false, true);
      });
    }

    async function loadFile(file) {
      const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/heic', 'image/heif'];
      if (!allowed.includes(file.type)) {
        elements.statusNote.textContent = '対応形式は JPEG / PNG / WEBP / HEIC です。';
        return;
      }
      if (file.size > 40 * 1024 * 1024) {
        elements.statusNote.textContent = '40 MB 以下の画像を選択してください。';
        return;
      }

      try {
        const image = await fileToImage(file);
        if (state.imageURL) URL.revokeObjectURL(state.imageURL);
        state.file = file;
        state.image = image;
        state.imageURL = URL.createObjectURL(file);
        state.fileType = file.type === 'image/jpeg' || file.type === 'image/png' || file.type === 'image/webp' ? file.type : 'image/png';
        state.originalWidth = image.naturalWidth;
        state.originalHeight = image.naturalHeight;
        state.originalSize = file.size;
        state.width = image.naturalWidth;
        state.height = image.naturalHeight;
        state.selectedGroup = 'Custom';
        state.activePresetId = null;
        state.cropW = 0;
        state.cropH = 0;
        state.toastDismissed = false;
        elements.groupSelect.value = 'Custom';
        elements.cropImage.src = state.imageURL;
        elements.editorLayout.classList.add('active');
        elements.dropzone.classList.add('hidden');
        syncDimensionInputs();
        renderPresets();
        fitImageToViewport(true);
        elements.originalSize.textContent = formatBytes(file.size);
        estimateOutputSize();
        elements.statusNote.textContent = `${image.naturalWidth} × ${image.naturalHeight} の画像を読み込みました。`;
      } catch (error) {
        console.error(error);
        elements.statusNote.textContent = '画像の読み込みに失敗しました。';
      } finally {
        elements.fileInput.value = '';
      }
    }

    function fileToImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('Image load failed'));
        };
        image.src = url;
      });
    }

    function onDimensionInput(kind) {
      const previousRatio = state.width / state.height;
      let nextWidth = clamp(parseInt(elements.widthInput.value || state.width, 10) || state.width, 50, 6000);
      let nextHeight = clamp(parseInt(elements.heightInput.value || state.height, 10) || state.height, 50, 6000);

      if (kind === 'width') {
        if (state.locked) nextHeight = clamp(Math.round(nextWidth / previousRatio), 50, 6000);
      } else {
        if (state.locked) nextWidth = clamp(Math.round(nextHeight * previousRatio), 50, 6000);
      }

      state.width = nextWidth;
      state.height = nextHeight;
      state.selectedGroup = 'Custom';
      state.activePresetId = null;
      elements.groupSelect.value = 'Custom';
      syncDimensionInputs();
      updateCanvasAspect();
      renderPresets();
      fitImageToViewport(false);
      estimateOutputSize();
    }

    function syncDimensionInputs() {
      elements.widthInput.value = state.width;
      elements.heightInput.value = state.height;
    }

    function updateCanvasAspect() {
      if (!state.image || !state.cropW || !state.cropH) return;
      const stageRect = elements.cropStage.getBoundingClientRect();
      if (!stageRect.width || !stageRect.height) return;
      const aspect = state.width / state.height;
      const centerX = state.cropX + state.cropW / 2;
      const centerY = state.cropY + state.cropH / 2;
      const oldArea = state.cropW * state.cropH;
      let newW = Math.sqrt(oldArea * aspect);
      let newH = newW / aspect;
      if (newW > stageRect.width) { newW = stageRect.width; newH = newW / aspect; }
      if (newH > stageRect.height) { newH = stageRect.height; newW = newH * aspect; }
      state.cropW = newW;
      state.cropH = newH;
      state.cropX = clamp(centerX - newW / 2, 0, stageRect.width - newW);
      state.cropY = clamp(centerY - newH / 2, 0, stageRect.height - newH);
      updateCropBox();
    }

    function updateLockButton() {
      elements.lockButton.setAttribute('aria-pressed', String(state.locked));
      elements.lockButton.classList.toggle('unlocked', !state.locked);
      elements.lockButton.title = state.locked ? '縦横比を固定中' : '縦横比の固定を解除中';
      elements.lockButton.innerHTML = state.locked
        ? `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 11V8C7 5.23858 9.23858 3 12 3C14.7614 3 17 5.23858 17 8V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" /><rect x="5" y="11" width="14" height="10" rx="3" stroke="currentColor" stroke-width="2" /></svg>`
        : `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 11V8C7 5.23858 9.23858 3 12 3C13.6877 3 15.1802 3.83509 16.0866 5.11459" stroke="currentColor" stroke-width="2" stroke-linecap="round" /><path d="M5 11H16C17.6569 11 19 12.3431 19 14V18C19 19.6569 17.6569 21 16 21H8C6.34315 21 5 19.6569 5 18V11Z" stroke="currentColor" stroke-width="2" /><path d="M18 4L21 7M21 4L18 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>`;
    }

    function updateZoomLabel() {
      elements.zoomSlider.value = state.zoom.toFixed(1);
      elements.zoomValue.textContent = `${state.zoom.toFixed(1).replace(/\.0$/, '')}x`;
    }

    function fitImageToViewport(resetZoom = true, _preserveView = false) {
      if (!state.image) return;

      const stageRect = elements.cropStage.getBoundingClientRect();
      const stageW = stageRect.width;
      const stageH = stageRect.height;

      if (resetZoom || !state.cropW || !state.cropH) {
        const aspect = state.width / state.height;
        let boxW, boxH;
        if (stageW / stageH > aspect) {
          boxH = stageH;
          boxW = boxH * aspect;
        } else {
          boxW = stageW;
          boxH = boxW / aspect;
        }
        state.cropX = (stageW - boxW) / 2;
        state.cropY = (stageH - boxH) / 2;
        state.cropW = boxW;
        state.cropH = boxH;
        updateCropBox();
      }

      const fitScale = Math.max(state.cropW / state.originalWidth, state.cropH / state.originalHeight);
      state.baseScale = fitScale;
      state.minScale = 1;
      state.imageWidth = state.originalWidth * fitScale;
      state.imageHeight = state.originalHeight * fitScale;

      if (resetZoom) {
        state.zoom = 1;
        elements.zoomSlider.value = '1';
        state.offsetX = 0;
        state.offsetY = 0;
      }

      updateZoomLabel();
      constrainOffsets();
      renderImageTransform();
      updateToast();
    }

    function displayWidth() {
      return state.imageWidth * state.zoom;
    }

    function displayHeight() {
      return state.imageHeight * state.zoom;
    }

    function constrainOffsets() {
      const stageRect = elements.cropStage.getBoundingClientRect();
      const stageW = stageRect.width;
      const stageH = stageRect.height;
      const dW = displayWidth();
      const dH = displayHeight();
      // Image must cover the crop box
      const minX = state.cropX + state.cropW - stageW / 2 - dW / 2;
      const maxX = state.cropX - stageW / 2 + dW / 2;
      const minY = state.cropY + state.cropH - stageH / 2 - dH / 2;
      const maxY = state.cropY - stageH / 2 + dH / 2;
      state.offsetX = clamp(state.offsetX, Math.min(minX, maxX), Math.max(minX, maxX));
      state.offsetY = clamp(state.offsetY, Math.min(minY, maxY), Math.max(minY, maxY));
    }

    function renderImageTransform() {
      if (!state.image) return;
      const width = displayWidth();
      const height = displayHeight();
      elements.cropImage.style.width = `${width}px`;
      elements.cropImage.style.height = `${height}px`;
      elements.cropImage.style.transform = `translate(calc(-50% + ${state.offsetX}px), calc(-50% + ${state.offsetY}px))`;
    }

    function updateToast() {
      const shouldShow = !!state.image && !state.toastDismissed;
      elements.dragToast.classList.toggle('hidden', !shouldShow);
    }

    function setupDragging() {
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let originX = 0;
      let originY = 0;

      const onPointerMove = (event) => {
        if (!dragging) return;
        const clientX = event.clientX ?? (event.touches && event.touches[0]?.clientX);
        const clientY = event.clientY ?? (event.touches && event.touches[0]?.clientY);
        if (clientX == null || clientY == null) return;
        state.offsetX = originX + (clientX - startX);
        state.offsetY = originY + (clientY - startY);
        constrainOffsets();
        renderImageTransform();
      };

      const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        elements.cropStage.classList.remove('dragging');
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', endDrag);
        estimateOutputSize();
      };

      elements.cropStage.addEventListener('pointerdown', (event) => {
        if (!state.image) return;
        dragging = true;
        elements.cropStage.classList.add('dragging');
        startX = event.clientX;
        startY = event.clientY;
        originX = state.offsetX;
        originY = state.offsetY;
        elements.cropStage.setPointerCapture?.(event.pointerId);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', endDrag);
      });

      elements.cropStage.addEventListener('wheel', (event) => {
        if (!state.image) return;
        event.preventDefault();
        const delta = Math.sign(event.deltaY) * -0.15;
        state.zoom = clamp(state.zoom + delta, 1, 10);
        updateZoomLabel();
        constrainOffsets();
        renderImageTransform();
        estimateOutputSize();
      }, { passive: false });
    }

    async function exportBlob() {
      if (!state.image) return null;
      const canvas = document.createElement('canvas');
      canvas.width = state.width;
      canvas.height = state.height;
      const ctx = canvas.getContext('2d');
      if (!ctx) return null;

      const stageRect = elements.cropStage.getBoundingClientRect();
      const stageW = stageRect.width;
      const stageH = stageRect.height;
      const scaleOutput = state.width / state.cropW;
      const drawWidth = displayWidth() * scaleOutput;
      const drawHeight = displayHeight() * scaleOutput;
      const imgCenterX = stageW / 2 + state.offsetX;
      const imgCenterY = stageH / 2 + state.offsetY;
      const cropCenterX = state.cropX + state.cropW / 2;
      const cropCenterY = state.cropY + state.cropH / 2;
      const centerX = state.width / 2 + (imgCenterX - cropCenterX) * scaleOutput;
      const centerY = state.height / 2 + (imgCenterY - cropCenterY) * scaleOutput;
      const dx = centerX - drawWidth / 2;
      const dy = centerY - drawHeight / 2;

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(state.image, dx, dy, drawWidth, drawHeight);

      return await new Promise((resolve) => {
        canvas.toBlob(
          (blob) => resolve(blob),
          state.fileType,
          state.fileType === 'image/jpeg' || state.fileType === 'image/webp' ? 0.92 : undefined
        );
      });
    }

    function updateCropBox() {
      const { cropX: x, cropY: y, cropW: w, cropH: h } = state;
      elements.cropGrid.style.left = `${x}px`;
      elements.cropGrid.style.top = `${y}px`;
      elements.cropGrid.style.width = `${w}px`;
      elements.cropGrid.style.height = `${h}px`;
      elements.cropOverlay.style.clipPath =
        `path('M 0 0 L 100000 0 L 100000 100000 L 0 100000 Z M ${x} ${y} L ${x} ${y + h} L ${x + w} ${y + h} L ${x + w} ${y} Z')`;
    }

    function setupCropBoxDragging() {
      const MIN = 50;

      elements.cropGrid.addEventListener('pointerdown', (e) => {
        if (!state.image) return;
        if (e.target.classList.contains('crop-handle')) return;
        e.stopPropagation();
        const stageRect = elements.cropStage.getBoundingClientRect();
        const startX = e.clientX;
        const startY = e.clientY;
        const origX = state.cropX;
        const origY = state.cropY;

        const onMove = (e) => {
          state.cropX = clamp(origX + e.clientX - startX, 0, stageRect.width - state.cropW);
          state.cropY = clamp(origY + e.clientY - startY, 0, stageRect.height - state.cropH);
          updateCropBox();
          constrainOffsets();
        };
        const onUp = () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          estimateOutputSize();
        };
        elements.cropGrid.setPointerCapture(e.pointerId);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });

      elements.cropGrid.querySelectorAll('.crop-handle').forEach((handle) => {
        handle.addEventListener('pointerdown', (e) => {
          if (!state.image) return;
          e.stopPropagation();
          const dir = handle.dataset.handle;
          const stageRect = elements.cropStage.getBoundingClientRect();
          const startX = e.clientX;
          const startY = e.clientY;
          const origX = state.cropX;
          const origY = state.cropY;
          const origW = state.cropW;
          const origH = state.cropH;
          const scaleX = state.width / origW;
          const scaleY = state.height / origH;

          const onMove = (e) => {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            let newX = origX, newY = origY, newW = origW, newH = origH;
            if (dir.includes('e')) newW = clamp(origW + dx, MIN, stageRect.width - origX);
            if (dir.includes('w')) { newW = clamp(origW - dx, MIN, origX + origW); newX = origX + origW - newW; }
            if (dir.includes('s')) newH = clamp(origH + dy, MIN, stageRect.height - origY);
            if (dir.includes('n')) { newH = clamp(origH - dy, MIN, origY + origH); newY = origY + origH - newH; }
            state.cropX = newX;
            state.cropY = newY;
            state.cropW = newW;
            state.cropH = newH;
            state.width = Math.max(50, Math.round(newW * scaleX));
            state.height = Math.max(50, Math.round(newH * scaleY));
            state.selectedGroup = 'Custom';
            state.activePresetId = null;
            elements.groupSelect.value = 'Custom';
            syncDimensionInputs();
            updateCropBox();
            constrainOffsets();
          };
          const onUp = () => {
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            renderPresets();
            estimateOutputSize();
          };
          handle.setPointerCapture(e.pointerId);
          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp);
        });
      });
    }

    function estimateOutputSize() {
      clearTimeout(state.estimateTimer);
      if (!state.image) {
        elements.outputSize.textContent = '--';
        return;
      }
      state.estimateTimer = setTimeout(async () => {
        const blob = await exportBlob();
        elements.outputSize.textContent = blob ? formatBytes(blob.size) : '--';
      }, 180);
    }

    function formatBytes(bytes) {
      if (!bytes || !Number.isFinite(bytes)) return '--';
      const units = ['B', 'KB', 'MB', 'GB'];
      let value = bytes;
      let unit = units[0];
      for (let i = 0; i < units.length; i++) {
        unit = units[i];
        if (value < 1024 || i === units.length - 1) break;
        value /= 1024;
      }
      return `${value.toFixed(value >= 100 || unit === 'B' ? 0 : value >= 10 ? 1 : 2)} ${unit}`;
    }

    function typeToExtension(type) {
      if (type === 'image/jpeg') return 'jpg';
      if (type === 'image/webp') return 'webp';
      return 'png';
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    init();
  </script>
</body>
</html>
